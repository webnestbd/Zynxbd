<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynxbd Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#f8fafc;
}

.card{
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.hidden{
display:none;
}
</style>

</head>
<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="min-h-screen flex items-center justify-center p-4">

<div class="card w-full max-w-md">

<h2 class="text-3xl font-bold text-center mb-6">
Admin Login
</h2>

<form id="loginForm" class="space-y-4">

<input
type="email"
id="email"
placeholder="Admin Email"
required
class="w-full border p-3 rounded-lg">

<input
type="password"
id="password"
placeholder="Password"
required
class="w-full border p-3 rounded-lg">

<button
type="submit"
class="w-full bg-pink-500 text-white p-3 rounded-lg">
Login
</button>

</form>

<p id="loginError" class="text-red-500 mt-3 text-center"></p>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardPage" class="hidden">

<header class="bg-white shadow p-4 flex justify-between items-center">

<h1 class="text-2xl font-bold">
Zynxbd Admin Dashboard
</h1>

<button
id="logoutBtn"
class="bg-red-500 text-white px-4 py-2 rounded">
Logout
</button>

</header>

<div class="p-6">

<!-- STATS -->

<div class="grid md:grid-cols-4 gap-4">

<div class="card">
<h3>Total Orders</h3>
<p id="totalOrders" class="text-3xl font-bold">0</p>
</div>

<div class="card">
<h3>Pending Orders</h3>
<p id="pendingOrders" class="text-3xl font-bold">0</p>
</div>

<div class="card">
<h3>Delivered Orders</h3>
<p id="deliveredOrders" class="text-3xl font-bold">0</p>
</div>

<div class="card">
<h3>Today Sales</h3>
<p id="todaySales" class="text-3xl font-bold">0 ৳</p>
</div>
<div class="card">
<h3>Monthly Sales</h3>
<p id="monthlySales" class="text-3xl font-bold">0 ৳</p>
</div>

<div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue" class="text-3xl font-bold">0 ৳</p>
</div>
</div>

<!-- ORDERS -->

<div class="card mt-6">
<div class="card mt-6">

<h2 class="text-xl font-bold mb-4">
Product Management
</h2>

<form id="productForm" class="grid gap-3 mb-6">

<input
id="pName"
placeholder="Product Name"
class="border p-2 rounded">

<input
id="pDescription"
placeholder="Description"
class="border p-2 rounded">

<input
id="pPrice"
type="number"
placeholder="Price"
class="border p-2 rounded">

<input
id="pCategory"
placeholder="Category"
class="border p-2 rounded">

<input
id="pImage"
placeholder="Image URL"
class="border p-2 rounded">

<input
id="pStock"
type="number"
placeholder="Stock"
class="border p-2 rounded">

<button
class="bg-green-500 text-white p-2 rounded">
Add Product
</button>

</form>

<div class="overflow-auto">

<table class="w-full">

<thead>

<tr class="border-b">

<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Action</th>

</tr>

</thead>

<tbody id="productTable"></tbody>

</table>

</div>

</div>
<h2 class="text-xl font-bold mb-4">
Orders
</h2>

<div class="overflow-auto">

<table class="w-full">

<thead>

<tr class="border-b">

<th class="p-2 text-left">Customer</th>
<th class="p-2 text-left">Phone</th>
<th class="p-2 text-left">Amount</th>
<th class="p-2 text-left">Status</th>
<th class="p-2 text-left">Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL =
"https://omotctqkemtuogpnlywo.supabase.co";

const SUPABASE_KEY =
"sb_publishable_6vLOupcl0H3fPfkOEdHYuw_mNCC_3IO";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* LOGIN */

const loginForm =
document.getElementById("loginForm");

loginForm.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const {error} =
await supabase.auth.signInWithPassword({
email,
password
});

if(error){

document.getElementById(
"loginError"
).innerText = error.message;

return;

}

showDashboard();

}
);

/* CHECK SESSION */

async function checkSession(){

const {
data:{session}
}
=
await supabase.auth.getSession();

if(session){

showDashboard();

}

}

function showDashboard(){

document
.getElementById("loginPage")
.classList.add("hidden");

document
.getElementById("dashboardPage")
.classList.remove("hidden");

loadDashboard();

}

/* LOGOUT */

document
.getElementById("logoutBtn")
.addEventListener(
"click",
async()=>{

await supabase.auth.signOut();

location.reload();

}
);
/* DASHBOARD DATA */

async function loadDashboard() {

await loadStats();

await loadOrders();

await loadRevenue();

await loadProducts();

}

/* LOAD STATS */

async function loadStats() {

  try {

    const { data: orders, error } =
    await supabase
    .from("orders")
    .select("*");

    if(error) throw error;

    const totalOrders = orders.length;

    const pendingOrders =
    orders.filter(
      o => o.status === "Pending"
    ).length;

    const deliveredOrders =
    orders.filter(
      o => o.status === "Delivered"
    ).length;

    const today = new Date()
    .toISOString()
    .split("T")[0];

    let todaySales = 0;

    orders.forEach(order => {

      const orderDate =
      new Date(order.created_at)
      .toISOString()
      .split("T")[0];

      if(
        orderDate === today &&
        order.status === "Delivered"
      ){
        todaySales +=
        Number(order.total_price || 0);
      }

    });

    document.getElementById(
      "totalOrders"
    ).innerText = totalOrders;

    document.getElementById(
      "pendingOrders"
    ).innerText = pendingOrders;

    document.getElementById(
      "deliveredOrders"
    ).innerText = deliveredOrders;

    document.getElementById(
      "todaySales"
    ).innerText =
    todaySales + " ৳";

  }

  catch(err){

    console.error(err);

  }

}

/* LOAD ORDERS */

async function loadOrders(){

  try{

    const {
      data,
      error
    } =
    await supabase
    .from("orders")
    .select("*")
    .order(
      "created_at",
      {ascending:false}
    );

    if(error) throw error;

    const tbody =
    document.getElementById(
      "ordersTable"
    );

    tbody.innerHTML = "";

    data.forEach(order=>{

      tbody.innerHTML += `
      <tr class="border-b">

        <td class="p-2">
          ${order.customer_name || ""}
        </td>

        <td class="p-2">
          ${order.phone || ""}
        </td>

        <td class="p-2">
          ${order.total_price || 0} ৳
        </td>

        <td class="p-2">
          <span class="font-semibold">
          ${order.status || "Pending"}
          </span>
        </td>

        <td class="p-2">

          <select
          onchange="updateStatus(${order.id},this.value)"
          class="border p-1 rounded">

            <option value="">
            Change
            </option>

            <option value="Pending">
            Pending
            </option>

            <option value="Processing">
            Processing
            </option>

            <option value="Delivered">
            Delivered
            </option>

            <option value="Cancelled">
            Cancelled
            </option>

          </select>

        </td>

      </tr>
      `;

    });

  }

  catch(err){

    console.error(err);

  }

}

/* UPDATE STATUS */

window.updateStatus =
async function(
  id,
  status
){

  if(!status) return;

  try{

    const {error} =
    await supabase
    .from("orders")
    .update({
      status: status,
      updated_at:
      new Date().toISOString()
    })
    .eq("id",id);

    if(error) throw error;

    alert(
      "Order Updated Successfully"
    );

    await loadStats();

    await loadOrders();

  }

  catch(err){

    alert(err.message);

  }

}
  /* MONTHLY SALES */

async function loadRevenue(){

const {data} =
await supabase
.from("orders")
.select("*");

let monthly = 0;
let total = 0;

const currentMonth =
new Date().getMonth();

data.forEach(order=>{

if(order.status==="Delivered"){

total += Number(
order.total_price || 0
);

const month =
new Date(
order.created_at
).getMonth();

if(month===currentMonth){

monthly += Number(
order.total_price || 0
);

}

}

});

document.getElementById(
"monthlySales"
).innerText =
monthly + " ৳";

document.getElementById(
"totalRevenue"
).innerText =
total + " ৳";

}
checkSession();

</script>

</body>
</html>
