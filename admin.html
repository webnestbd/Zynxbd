<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynxbd Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">

<!-- LOGIN PAGE -->
<div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
    <h2 class="text-3xl font-bold text-center mb-6">Admin Login</h2>
    
    <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
      <div>
        <input type="email" id="email" placeholder="Email" value="admin@zynxbd.com" required class="w-full border rounded p-3">
      </div>
      <div>
        <input type="password" id="password" placeholder="Password" value="zynxbd@babult" required class="w-full border rounded p-3">
      </div>
      <button type="submit" class="w-full bg-pink-500 text-white p-3 rounded font-bold hover:bg-pink-600">Login</button>
    </form>
    
    <div id="loginError" class="text-red-500 mt-3 text-center text-sm"></div>
    <div id="loginLoading" class="text-blue-500 mt-3 text-center text-sm hidden">Logging in...</div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="hidden">
  
  <!-- Header -->
  <div class="bg-white shadow p-6 flex justify-between items-center">
    <h1 class="text-3xl font-bold">Zynxbd Admin</h1>
    <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="p-6 max-w-6xl mx-auto">
    
    <!-- Stats -->
    <div class="grid md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-6 rounded shadow">
        <p class="text-gray-600">Total Orders</p>
        <p class="text-3xl font-bold" id="totalOrders">0</p>
      </div>
      <div class="bg-white p-6 rounded shadow">
        <p class="text-gray-600">Pending</p>
        <p class="text-3xl font-bold" id="pendingOrders">0</p>
      </div>
      <div class="bg-white p-6 rounded shadow">
        <p class="text-gray-600">Delivered</p>
        <p class="text-3xl font-bold" id="deliveredOrders">0</p>
      </div>
      <div class="bg-white p-6 rounded shadow">
        <p class="text-gray-600">Total Revenue</p>
        <p class="text-3xl font-bold" id="totalRevenue">০ ৳</p>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="bg-white rounded shadow p-6 mb-6">
      <h2 class="text-2xl font-bold mb-4">Orders</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="border-b">
            <tr>
              <th class="text-left p-2">Customer</th>
              <th class="text-left p-2">Phone</th>
              <th class="text-left p-2">Amount</th>
              <th class="text-left p-2">Status</th>
              <th class="text-left p-2">Action</th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
      <p id="noOrders" class="text-center text-gray-500 p-4">No orders yet</p>
    </div>

    <!-- Products Table -->
    <div class="bg-white rounded shadow p-6">
      <h2 class="text-2xl font-bold mb-4">Products</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="border-b">
            <tr>
              <th class="text-left p-2">Name</th>
              <th class="text-left p-2">Price</th>
              <th class="text-left p-2">Stock</th>
              <th class="text-left p-2">Category</th>
            </tr>
          </thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
      <p id="noProducts" class="text-center text-gray-500 p-4">No products yet</p>
    </div>

  </div>

</div>

<script>
const SUPABASE_URL = "https://omotctqkemtuogpnlywo.supabase.co";
const SUPABASE_KEY = "sb_publishable_6vLOupcl0H3fPfkOEdHYuw_mNCC_3IO";

let supabase;
let currentUser = null;

// Initialize Supabase
try {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  console.log("✅ Supabase initialized");
} catch(e) {
  console.error("❌ Supabase init error:", e);
  document.getElementById("loginError").innerText = "Supabase initialization failed";
}

// Check if user already logged in
async function checkSession() {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      showDashboard();
    }
  } catch(e) {
    console.error("Session check error:", e);
  }
}

// Handle Login
async function handleLogin(event) {
  event.preventDefault();
  
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorDiv = document.getElementById("loginError");
  const loadingDiv = document.getElementById("loginLoading");
  
  errorDiv.innerText = "";
  loadingDiv.classList.remove("hidden");
  
  try {
    console.log("🔐 Attempting login with:", email);
    
    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });
    
    if (error) {
      console.error("❌ Login error:", error.message);
      errorDiv.innerText = "Login failed: " + error.message;
      loadingDiv.classList.add("hidden");
      return;
    }
    
    console.log("✅ Login successful");
    currentUser = data.user;
    loadingDiv.classList.add("hidden");
    showDashboard();
    
  } catch(err) {
    console.error("❌ Login exception:", err);
    errorDiv.innerText = "Error: " + err.message;
    loadingDiv.classList.add("hidden");
  }
}

// Show Dashboard
function showDashboard() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboardPage").classList.remove("hidden");
  loadDashboard();
}

// Load Dashboard Data
async function loadDashboard() {
  try {
    await loadStats();
    await loadOrders();
    await loadProducts();
  } catch(e) {
    console.error("Dashboard load error:", e);
  }
}

// Load Stats
async function loadStats() {
  try {
    const { data: orders, error } = await supabase.from("orders").select("*");
    
    if (error) throw error;
    
    if (!orders || orders.length === 0) {
      document.getElementById("totalOrders").innerText = "0";
      document.getElementById("pendingOrders").innerText = "0";
      document.getElementById("deliveredOrders").innerText = "0";
      document.getElementById("totalRevenue").innerText = "০ ৳";
      return;
    }
    
    const total = orders.length;
    const pending = orders.filter(o => o.status === "Pending").length;
    const delivered = orders.filter(o => o.status === "Delivered").length;
    const revenue = orders
      .filter(o => o.status === "Delivered")
      .reduce((sum, o) => sum + (Number(o.total_price) || 0), 0);
    
    document.getElementById("totalOrders").innerText = total;
    document.getElementById("pendingOrders").innerText = pending;
    document.getElementById("deliveredOrders").innerText = delivered;
    document.getElementById("totalRevenue").innerText = revenue + " ৳";
    
  } catch(e) {
    console.error("Stats error:", e);
  }
}

// Load Orders
async function loadOrders() {
  try {
    const { data: orders, error } = await supabase
      .from("orders")
      .select("*")
      .order("created_at", { ascending: false });
    
    if (error) throw error;
    
    const tbody = document.getElementById("ordersTable");
    const noOrders = document.getElementById("noOrders");
    
    if (!orders || orders.length === 0) {
      tbody.innerHTML = "";
      noOrders.classList.remove("hidden");
      return;
    }
    
    noOrders.classList.add("hidden");
    tbody.innerHTML = orders.map(order => `
      <tr class="border-b hover:bg-gray-50">
        <td class="p-2">${order.customer_name || "-"}</td>
        <td class="p-2">${order.phone || "-"}</td>
        <td class="p-2">${order.total_price || 0} ৳</td>
        <td class="p-2">
          <select onchange="updateOrderStatus(${order.id}, this.value)" class="border rounded p-1">
            <option value="Pending" ${order.status === "Pending" ? "selected" : ""}>Pending</option>
            <option value="Processing" ${order.status === "Processing" ? "selected" : ""}>Processing</option>
            <option value="Delivered" ${order.status === "Delivered" ? "selected" : ""}>Delivered</option>
            <option value="Cancelled" ${order.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
          </select>
        </td>
        <td class="p-2"><button onclick="viewOrderDetails(${order.id})" class="text-blue-500 underline text-sm">View</button></td>
      </tr>
    `).join("");
    
  } catch(e) {
    console.error("Orders error:", e);
  }
}

// Load Products
async function loadProducts() {
  try {
    const { data: products, error } = await supabase.from("products").select("*");
    
    if (error) throw error;
    
    const tbody = document.getElementById("productsTable");
    const noProducts = document.getElementById("noProducts");
    
    if (!products || products.length === 0) {
      tbody.innerHTML = "";
      noProducts.classList.remove("hidden");
      return;
    }
    
    noProducts.classList.add("hidden");
    tbody.innerHTML = products.map(product => `
      <tr class="border-b hover:bg-gray-50">
        <td class="p-2">${product.name || "-"}</td>
        <td class="p-2">${product.price || 0} ৳</td>
        <td class="p-2">${product.stock || 0}</td>
        <td class="p-2">${product.category || "-"}</td>
      </tr>
    `).join("");
    
  } catch(e) {
    console.error("Products error:", e);
  }
}

// Update Order Status
async function updateOrderStatus(orderId, status) {
  try {
    const { error } = await supabase
      .from("orders")
      .update({ status, updated_at: new Date().toISOString() })
      .eq("id", orderId);
    
    if (error) throw error;
    alert("Order updated");
    await loadStats();
    await loadOrders();
  } catch(e) {
    alert("Error: " + e.message);
  }
}

// View Order Details
async function viewOrderDetails(orderId) {
  try {
    const { data: order, error } = await supabase
      .from("orders")
      .select("*")
      .eq("id", orderId)
      .single();
    
    if (error) throw error;
    
    alert(`Order #${order.id}\nCustomer: ${order.customer_name}\nPhone: ${order.phone}\nEmail: ${order.email}\nAddress: ${order.address}\nProduct: ${order.product_name}\nAmount: ${order.total_price} ৳\nStatus: ${order.status}\nPayment: ${order.payment_method}\nTrx: ${order.trx_id}`);
  } catch(e) {
    alert("Error: " + e.message);
  }
}

// Handle Logout
async function handleLogout() {
  try {
    await supabase.auth.signOut();
    document.getElementById("loginPage").classList.remove("hidden");
    document.getElementById("dashboardPage").classList.add("hidden");
    document.getElementById("loginError").innerText = "";
  } catch(e) {
    console.error("Logout error:", e);
  }
}

// Check session on load
checkSession();

</script>

</body>
</html>
