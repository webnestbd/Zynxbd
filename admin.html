<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zynxbd Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#f8fafc;
}

.card{
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.hidden{
display:none;
}
  table{
font-size:14px;
}

@media(max-width:768px){

.card{
padding:12px;
}

h1{
font-size:20px;
}

table{
font-size:12px;
}

}
</style>

</head>
<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="min-h-screen flex items-center justify-center p-4">

<div class="card w-full max-w-md">

<h2 class="text-3xl font-bold text-center mb-6">
Admin Login
</h2>

<form id="loginForm" class="space-y-4">

<input
type="email"
id="email"
placeholder="Admin Email"
required
class="w-full border p-3 rounded-lg">

<input
type="password"
id="password"
placeholder="Password"
required
class="w-full border p-3 rounded-lg">

<button
type="submit"
class="w-full bg-pink-500 text-white p-3 rounded-lg">
Login
</button>

</form>

<p id="loginError" class="text-red-500 mt-3 text-center"></p>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardPage" class="hidden">

<header class="bg-white shadow p-4 flex justify-between items-center">

<h1 class="text-2xl font-bold">
Zynxbd Admin Dashboard
</h1>

<button
id="logoutBtn"
class="bg-red-500 text-white px-4 py-2 rounded">
Logout
</button>

</header>

<div class="p-6">

<!-- STATS -->

<div class="grid md:grid-cols-4 gap-4">

<div class="card">
<h3>Total Orders</h3>
<p id="totalOrders" class="text-3xl font-bold">0</p>
</div>

<div class="card">
<h3>Pending Orders</h3>
<p id="pendingOrders" class="text-3xl font-bold">0</p>
</div>

<div class="card">
<h3>Delivered Orders</h3>
<p id="deliveredOrders" class="text-3xl font-bold">0</p>
</div>

<div class="card">
<h3>Today Sales</h3>
<p id="todaySales" class="text-3xl font-bold">0 ৳</p>
</div>
<div class="card">
<h3>Monthly Sales</h3>
<p id="monthlySales" class="text-3xl font-bold">0 ৳</p>
</div>

<div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue" class="text-3xl font-bold">0 ৳</p>
</div>
</div>

<!-- PRODUCT MANAGEMENT -->

<div class="card mt-6">

<h2 class="text-xl font-bold mb-4">
Product Management
</h2>
<form id="productForm" class="grid gap-3 mb-6">

<input
id="pName"
placeholder="Product Name"
class="border p-2 rounded">

<input
id="pDescription"
placeholder="Description"
class="border p-2 rounded">

<input
id="pPrice"
type="number"
placeholder="Price"
class="border p-2 rounded">

<input
id="pCategory"
placeholder="Category"
class="border p-2 rounded">

<input
id="pImage"
placeholder="Image URL"
class="border p-2 rounded">

<input
id="pStock"
type="number"
placeholder="Stock"
class="border p-2 rounded">

<button type="submit"
class="bg-green-500 text-white p-2 rounded">
Add Product
</button>

</form>

<div class="overflow-auto">

<table class="w-full">

<thead>

<tr class="border-b">

<th class="p-2 text-left">Name</th>
<th class="p-2 text-left">Price</th>
<th class="p-2 text-left">Stock</th>
<th class="p-2 text-left">Action</th>

</tr>

</thead>

<tbody id="productTable"></tbody>

</table>

</div>

</div>

<!-- ORDERS -->

<div class="card mt-6">

<h2 class="text-xl font-bold mb-4">
Orders
</h2>

<input
id="orderSearch"
placeholder="Search customer, phone..."
class="border p-2 rounded w-full mb-4">

<button
onclick="exportCSV()"
class="bg-green-600 text-white px-4 py-2 rounded mb-4">

Export CSV

</button>

<div class="overflow-auto">

<table class="w-full">

<thead>

<tr class="border-b">

<th class="p-2 text-left">Customer</th>
<th class="p-2 text-left">Phone</th>
<th class="p-2 text-left">Amount</th>
<th class="p-2 text-left">Status</th>
<th class="p-2 text-left">Admin Note</th>
<th class="p-2 text-left">Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<!-- ORDER MODAL -->
<div
id="orderModal"
class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

<div class="bg-white p-6 rounded-lg w-full max-w-lg">

<h2 class="text-xl font-bold mb-4">
Order Details
</h2>

<div id="orderDetails"></div>

<button
onclick="closeModal()"
class="bg-red-500 text-white px-4 py-2 rounded mt-4">

Close

</button>

</div>

</div>

<script>

/* SUPABASE */

console.log("Initializing Supabase...");

const SUPABASE_URL =
"https://omotctqkemtuogpnlywo.supabase.co";

const SUPABASE_KEY =
"sb_publishable_6vLOupcl0H3fPfkOEdHYuw_mNCC_3IO";

console.log("Supabase URL:", SUPABASE_URL);
console.log("window.supabase exists:", !!window.supabase);

if(!window.supabase){
  console.error("Supabase library not loaded from CDN!");
  document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:50px;'>Error: Supabase library failed to load. Please refresh the page.</h1>";
}

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

console.log("Supabase client created:", !!supabase);

/* LOGIN */

const loginForm =
document.getElementById("loginForm");

loginForm.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

console.log("Login form submitted");

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

console.log("Email:", email);
console.log("Supabase object exists:", !!supabase);

if(!supabase){
  console.error("Supabase not loaded!");
  document.getElementById("loginError").innerText = "Supabase not loaded";
  return;
}

try{

const {data, error} =
await supabase.auth.signInWithPassword({
email,
password
});

console.log("Login response:", {data, error});

if(error){

console.error("Login error:", error.message);

document.getElementById(
"loginError"
).innerText = error.message;

return;

}

console.log("Login successful, showing dashboard");

showDashboard();

}

catch(err){

console.error("Login exception:", err);

document.getElementById(
"loginError"
).innerText = "Error: " + err.message;

}

}
);

/* CHECK SESSION */

async function checkSession(){

console.log("Checking session...");

const {
data:{session}
}
=
await supabase.auth.getSession();

console.log("Session exists:", !!session);
console.log("Session data:", session);

if(session){

console.log("User logged in, showing dashboard");

showDashboard();

}

}

function showDashboard(){

document
.getElementById("loginPage")
.classList.add("hidden");

document
.getElementById("dashboardPage")
.classList.remove("hidden");

loadDashboard();

}

/* LOGOUT */

document
.getElementById("logoutBtn")
.addEventListener(
"click",
async()=>{

await supabase.auth.signOut();

location.reload();

}
);

/* DASHBOARD DATA */

async function loadDashboard() {

await loadStats();

await loadOrders();

await loadRevenue();

await loadProducts();

}

/* LOAD STATS */

async function loadStats() {

  try {

    const { data: orders, error } =
    await supabase
    .from("orders")
    .select("*");

    if(error) throw error;

    const totalOrders = orders.length;

    const pendingOrders =
    orders.filter(
      o => o.status === "Pending"
    ).length;

    const deliveredOrders =
    orders.filter(
      o => o.status === "Delivered"
    ).length;

    const today = new Date()
    .toISOString()
    .split("T")[0];

    let todaySales = 0;

    orders.forEach(order => {

      const orderDate =
      new Date(order.created_at)
      .toISOString()
      .split("T")[0];

      if(
        orderDate === today &&
        order.status === "Delivered"
      ){
        todaySales +=
        Number(order.total_price || 0);
      }

    });

    document.getElementById(
      "totalOrders"
    ).innerText = totalOrders;

    document.getElementById(
      "pendingOrders"
    ).innerText = pendingOrders;

    document.getElementById(
      "deliveredOrders"
    ).innerText = deliveredOrders;

    document.getElementById(
      "todaySales"
    ).innerText =
    todaySales + " ৳";

  }

  catch(err){

    console.error(err);

  }

}

/* LOAD ORDERS */

async function loadOrders(){

  try{

    const {
      data,
      error
    } =
    await supabase
    .from("orders")
    .select("*")
    .order(
      "created_at",
      {ascending:false}
    );

    if(error) throw error;

    const tbody =
    document.getElementById(
      "ordersTable"
    );

    tbody.innerHTML = "";

    data.forEach(order=>{

      tbody.innerHTML += `
      <tr class="border-b">

        <td class="p-2">
          ${order.customer_name || ""}
        </td>

        <td class="p-2">
          ${order.phone || ""}
        </td>

        <td class="p-2">
          ${order.total_price || 0} ৳
        </td>

        <td class="p-2">
          <span class="font-semibold">
          ${order.status || "Pending"}
          </span>
        </td>

        <td class="p-2">

<input
value="${order.admin_note || ''}"
onchange="saveNote(${order.id},this.value)"
class="border p-1 rounded w-full">

</td>

        <td class="p-2">

<button
onclick="viewOrder(${order.id})"
class="bg-blue-500 text-white px-2 py-1 rounded mr-2">
View
</button>

<select
onchange="updateStatus(${order.id},this.value)"
class="border p-1 rounded">

            <option value="">
            Change
            </option>

            <option value="Pending">
            Pending
            </option>

            <option value="Processing">
            Processing
            </option>

            <option value="Delivered">
            Delivered
            </option>

            <option value="Cancelled">
            Cancelled
            </option>

          </select>

        </td>

      </tr>
      `;

    });

  }

  catch(err){

    console.error(err);

  }

}

/* UPDATE STATUS */

window.updateStatus =
async function(
  id,
  status
){

  if(!status) return;

  try{

    const {error} =
    await supabase
    .from("orders")
    .update({
      status: status,
      updated_at:
      new Date().toISOString()
    })
    .eq("id",id);

    if(error) throw error;

    alert(
      "Order Updated Successfully"
    );

    await loadStats();

    await loadOrders();

  }

  catch(err){

alert(err.message);

}

}

/* SAVE NOTE */

window.saveNote =
async function(
id,
note
){

  try{

    const {error} =
    await supabase
    .from("orders")
    .update({
      admin_note: note
    })
    .eq("id",id);

    if(error) throw error;

    alert("Note saved");

  }

  catch(err){

    console.error(err);

  }

}

/* LOAD PRODUCTS */

async function loadProducts(){

  try{

    const {data,error} =
    await supabase
    .from("products")
    .select("*");

    if(error) throw error;

    const table =
    document.getElementById(
    "productTable"
    );

    table.innerHTML="";

    data.forEach(product=>{

    table.innerHTML += `
    <tr class="border-b">

    <td class="p-2">${product.name}</td>

    <td class="p-2">${product.price}</td>

    <td class="p-2">${product.stock}</td>

    <td class="p-2 space-x-2">

    <button
    onclick="editProduct(${product.id})"
    class="bg-blue-500 text-white px-2 py-1 rounded">

    Edit

    </button>

    <button
    onclick="deleteProduct(${product.id})"
    class="bg-red-500 text-white px-2 py-1 rounded">

    Delete

    </button>

    </td>

    </tr>
    `;

    });

  }

  catch(err){

    console.error(err);

  }

}

/* ADD PRODUCT */

document
.getElementById("productForm")
.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const product = {

name:
document.getElementById(
"pName"
).value,

description:
document.getElementById(
"pDescription"
).value,

price:
Number(
document.getElementById(
"pPrice"
).value
),

category:
document.getElementById(
"pCategory"
).value,

image_url:
document.getElementById(
"pImage"
).value,

stock:
Number(
document.getElementById(
"pStock"
).value
),

active:true

};

try{

  const {error} =
  await supabase
  .from("products")
  .insert([product]);

  if(error) throw error;

  alert("Product Added");

  e.target.reset();

  await loadProducts();

}

catch(err){

  alert(err.message);

}

}
);

/* EDIT PRODUCT */

window.editProduct =
async function(id){

  try{

    const {data,error} =
    await supabase
    .from("products")
    .select("*")
    .eq("id",id)
    .single();

    if(error) throw error;

    const newPrice =
    prompt(
      "New Price",
      data.price
    );

    if(newPrice===null) return;

    const newStock =
    prompt(
      "New Stock",
      data.stock
    );

    if(newStock===null) return;

    const {error:updateError} =
    await supabase
    .from("products")
    .update({

    price:Number(newPrice),

    stock:Number(newStock)

    })
    .eq("id",id);

    if(updateError) throw updateError;

    alert("Product Updated");

    await loadProducts();

  }

  catch(err){

    console.error(err);

  }

}

/* DELETE PRODUCT */

window.deleteProduct =
async function(id){

  if(
  !confirm(
    "Delete Product?"
  )
  ) return;

  try{

    const {error} =
    await supabase
    .from("products")
    .delete()
    .eq("id",id);

    if(error) throw error;

    alert("Product Deleted");

    await loadProducts();

  }

  catch(err){

    console.error(err);

  }

}

/* VIEW ORDER */

window.viewOrder =
async function(id){

  try{

    const {data,error} =
    await supabase
    .from("orders")
    .select("*")
    .eq("id",id)
    .single();

    if(error) throw error;

    document.getElementById(
    "orderDetails"
    ).innerHTML = `

    <p><b>Name:</b> ${data.customer_name||""}</p>

    <p><b>Phone:</b> ${data.phone||""}</p>

    <p><b>Email:</b> ${data.email||""}</p>

    <p><b>Address:</b> ${data.address||""}</p>

    <p><b>Product:</b> ${data.product_name||""}</p>

    <p><b>Quantity:</b> ${data.quantity||0}</p>

    <p><b>Amount:</b> ${data.total_price||0} ৳</p>

    <p><b>Status:</b> ${data.status||""}</p>

    <p><b>Payment Method:</b> ${data.payment_method||""}</p>

    <p><b>Transaction ID:</b> ${data.trx_id||""}</p>

    <p><b>Admin Note:</b> ${data.admin_note||""}</p>

    `;

    document
    .getElementById("orderModal")
    .classList.remove("hidden");

  }

  catch(err){

    console.error(err);

  }

}

/* CLOSE MODAL */

function closeModal(){

document
.getElementById("orderModal")
.classList.add("hidden");

}

/* MONTHLY SALES */

async function loadRevenue(){

  try{

    const {data, error} =
    await supabase
    .from("orders")
    .select("*");

    if(error) throw error;

    let monthly = 0;
    let total = 0;

    const currentMonth =
    new Date().getMonth();

    data.forEach(order=>{

    if(order.status==="Delivered"){

    total += Number(
    order.total_price || 0
    );

    const month =
    new Date(
    order.created_at
    ).getMonth();

    if(month===currentMonth){

    monthly += Number(
    order.total_price || 0
    );

    }

    }

    });

    document.getElementById(
    "monthlySales"
    ).innerText =
    monthly + " ৳";

    document.getElementById(
    "totalRevenue"
    ).innerText =
    total + " ৳";

  }

  catch(err){

    console.error(err);

  }

}

/* SEARCH ORDERS */

document
.getElementById("orderSearch")
.addEventListener(
"input",
async function(){

const keyword =
this.value.toLowerCase();

const rows =
document.querySelectorAll(
"#ordersTable tr"
);

rows.forEach(row=>{

const text =
row.innerText.toLowerCase();

row.style.display =
text.includes(keyword)
? ""
: "none";

});

});

/* EXPORT CSV */

async function exportCSV(){

  try{

    const {data,error} =
    await supabase
    .from("orders")
    .select("*");

    if(error) throw error;

    let csv =
    "ID,Customer,Phone,Amount,Status\n";

    data.forEach(order=>{

    csv +=
    `${order.id},${order.customer_name},${order.phone},${order.total_price},${order.status}\n`;

    });

    const blob =
    new Blob([csv],{
    type:"text/csv"
    });

    const url =
    URL.createObjectURL(blob);

    const a =
    document.createElement("a");

    a.href = url;

    a.download =
    "orders.csv";

    a.click();

  }

  catch(err){

    console.error(err);

  }

}

/* AUTO REFRESH */

setInterval(()=>{

const dashboard =
document.getElementById(
"dashboardPage"
);

if(
!dashboard.classList.contains(
"hidden"
)
){

loadDashboard();

}

},30000);

/* INITIALIZE */

checkSession();

</script>

</body>
</html>
