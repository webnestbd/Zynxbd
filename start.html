<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zynxbd - শুরু করুন</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-r from-indigo-900 to-purple-800 min-h-screen flex items-center justify-center p-4">

<div class="max-w-2xl w-full">
  
  <!-- Header -->
  <div class="text-center mb-12">
    <h1 class="text-5xl font-bold text-white mb-2">Zynx<span class="text-pink-400">bd</span></h1>
    <p class="text-gray-200 text-lg">আপনার বিশ্বস্ত অনলাইন শপ</p>
  </div>

  <!-- Cards -->
  <div class="grid md:grid-cols-2 gap-6">
    
    <!-- Customer Card -->
    <a href="index.html" class="group">
      <div class="bg-white rounded-2xl p-8 text-center shadow-xl hover:shadow-2xl transition transform hover:scale-105">
        <div class="text-5xl mb-4">
          <i class="fas fa-shopping-bag text-pink-500"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">শপিং করুন</h2>
        <p class="text-gray-600 mb-4">আমাদের সকল পণ্য দেখুন এবং অর্ডার করুন</p>
        <button class="bg-pink-500 hover:bg-pink-600 text-white px-6 py-2 rounded-full font-semibold transition">
          শপিং শুরু করুন →
        </button>
      </div>
    </a>

    <!-- Admin Card -->
    <a href="admin.html" class="group">
      <div class="bg-white rounded-2xl p-8 text-center shadow-xl hover:shadow-2xl transition transform hover:scale-105">
        <div class="text-5xl mb-4">
          <i class="fas fa-lock text-blue-500"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">অ্যাডমিন প্যানেল</h2>
        <p class="text-gray-600 mb-4">অর্ডার ম্যানেজ করুন এবং পণ্য যোগ করুন</p>
        <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-full font-semibold transition">
          লগইন করুন →
        </button>
      </div>
    </a>

  </div>

  <!-- Footer -->
  <div class="text-center mt-12 text-gray-300">
    <p>© ২০২৬ Zynxbd | সব সময়ের জন্য নিরাপদ এবং বিশ্বস্ত</p>
  </div>

</div>

</body>
</html>
