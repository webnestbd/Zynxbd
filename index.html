<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zynxbd - অনলাইন শপ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 24px; border-radius: 40px; z-index: 9999; opacity: 0; transition: 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50">

<!-- Header -->
<header class="sticky top-0 z-40 bg-white shadow-md">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-3xl font-bold">Zynx<span class="text-pink-500">bd</span></h1>
    <div class="flex items-center gap-6">
      <button id="cartBtn" class="relative text-2xl text-gray-700 hover:text-pink-500 transition">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount" class="absolute -top-3 -right-3 bg-pink-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">0</span>
      </button>
    </div>
  </div>
</header>

<!-- Hero Section -->
<section class="bg-gradient-to-r from-pink-500 via-pink-400 to-purple-500 text-white py-20 text-center">
  <div class="max-w-4xl mx-auto px-4">
    <h2 class="text-5xl font-bold mb-4">সেরা পণ্য, সেরা দাম</h2>
    <p class="text-xl mb-8 opacity-90">আপনার পছন্দের সব কিছু এক জায়গায় পাবেন</p>
    <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" class="bg-white text-pink-500 px-8 py-3 rounded-full font-bold text-lg hover:bg-gray-100 transition">শপিং শুরু করুন</button>
  </div>
</section>

<!-- Products Section -->
<section id="products" class="max-w-6xl mx-auto px-4 py-16">
  <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-12">
    <h2 class="text-4xl font-bold">আমাদের <span class="text-pink-500">প্রোডাক্ট</span></h2>
    <div class="flex gap-2 w-full md:w-auto">
      <input type="text" id="searchInput" placeholder="পণ্য খুঁজুন..." class="flex-1 border-2 border-gray-300 rounded-lg px-4 py-2 focus:border-pink-500 outline-none">
      <button onclick="searchProducts()" class="bg-pink-500 hover:bg-pink-600 text-white px-6 py-2 rounded-lg font-bold transition">🔍</button>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div id="loader" class="flex justify-center py-8">
    <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Products Grid -->
  <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  
  <!-- No Products Message -->
  <div id="noProducts" class="text-center py-12 hidden">
    <p class="text-xl text-gray-500">কোনো পণ্য পাওয়া যায়নি</p>
  </div>
</section>

<!-- Features -->
<section class="bg-gray-100 py-12">
  <div class="max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
    <div>
      <div class="text-4xl text-pink-500 mb-2"><i class="fas fa-truck-fast"></i></div>
      <p class="font-semibold">দ্রুত ডেলিভারি</p>
    </div>
    <div>
      <div class="text-4xl text-pink-500 mb-2"><i class="fas fa-shield-alt"></i></div>
      <p class="font-semibold">নিরাপদ পেমেন্ট</p>
    </div>
    <div>
      <div class="text-4xl text-pink-500 mb-2"><i class="fas fa-headset"></i></div>
      <p class="font-semibold">২৪/৭ সাপোর্ট</p>
    </div>
    <div>
      <div class="text-4xl text-pink-500 mb-2"><i class="fas fa-undo-alt"></i></div>
      <p class="font-semibold">সহজ রিটার্ন</p>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-gray-900 text-white text-center py-6">
  <p>© ২০২৬ Zynxbd - আপনার বিশ্বস্ত অনলাইন শপ</p>
</footer>

<!-- Cart Modal -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl max-w-md w-full p-6 max-h-[80vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-2xl font-bold">আপনার কার্ট</h3>
      <button onclick="closeCart()" class="text-2xl text-gray-500">&times;</button>
    </div>
    
    <div id="cartItems" class="space-y-3 mb-4"></div>
    
    <div class="border-t-2 pt-4">
      <div class="flex justify-between text-lg font-bold mb-4">
        <span>মোট:</span>
        <span id="cartTotal">০ ৳</span>
      </div>
      <button onclick="proceedCheckout()" class="w-full bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-lg font-bold transition mb-2">অর্ডার করুন</button>
      <button onclick="closeCart()" class="w-full border-2 border-gray-300 py-3 rounded-lg font-bold">বন্ধ করুন</button>
    </div>
  </div>
</div>

<!-- Checkout Modal -->
<div id="checkoutModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-2xl font-bold">অর্ডার তথ্য</h3>
      <button onclick="closeCheckout()" class="text-2xl text-gray-500">&times;</button>
    </div>
    
    <form id="checkoutForm" class="space-y-3">
      <div>
        <label class="block text-sm font-medium mb-1">নাম</label>
        <input type="text" name="name" required class="w-full border-2 border-gray-300 rounded-lg p-2 focus:border-pink-500 outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-1">ফোন নাম্বার</label>
        <input type="tel" name="phone" required class="w-full border-2 border-gray-300 rounded-lg p-2 focus:border-pink-500 outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-1">ইমেইল</label>
        <input type="email" name="email" required class="w-full border-2 border-gray-300 rounded-lg p-2 focus:border-pink-500 outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-1">ঠিকানা</label>
        <textarea name="address" rows="2" required class="w-full border-2 border-gray-300 rounded-lg p-2 focus:border-pink-500 outline-none"></textarea>
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-1">পেমেন্ট পদ্ধতি</label>
        <select name="payment" required class="w-full border-2 border-gray-300 rounded-lg p-2 focus:border-pink-500 outline-none">
          <option value="">-- বেছে নিন --</option>
          <option value="bKash">bKash</option>
          <option value="Nagad">Nagad</option>
          <option value="Upay">Upay</option>
          <option value="Rocket">Rocket</option>
        </select>
      </div>
      
      <div>
        <label class="block text-sm font-medium mb-1">Transaction ID</label>
        <input type="text" name="trx_id" required class="w-full border-2 border-gray-300 rounded-lg p-2 focus:border-pink-500 outline-none">
      </div>
      
      <button type="submit" class="w-full bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-lg font-bold transition">অর্ডার নিশ্চিত করুন</button>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // =============== SUPABASE SETUP ===============
  const SUPABASE_URL = "https://omotctqkemtuogpnlywo.supabase.co";
  const SUPABASE_ANON = "sb_publishable_6vLOupcl0H3fPfkOEdHYuw_mNCC_3IO";
  
  let supabase;
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    console.log("✅ Supabase initialized");
  } catch(e) {
    console.error("❌ Supabase error:", e);
  }

  // =============== STATE ===============
  let allProducts = [];
  let cart = JSON.parse(localStorage.getItem('zynxCart')) || [];
  let currentSearch = '';

  // =============== DEMO DATA ===============
  const demoProducts = [
    { id: 1, name: "স্মার্টফোন", description: "অত্যাধুনিক স্মার্টফোন", price: 25000, image_url: "https://via.placeholder.com/300x300?text=Smartphone" },
    { id: 2, name: "ল্যাপটপ", description: "শক্তিশালী ল্যাপটপ", price: 75000, image_url: "https://via.placeholder.com/300x300?text=Laptop" },
    { id: 3, name: "হেডফোন", description: "উচ্চমানের অডিও", price: 5000, image_url: "https://via.placeholder.com/300x300?text=Headphone" },
    { id: 4, name: "ক্যামেরা", description: "পেশাদার ক্যামেরা", price: 45000, image_url: "https://via.placeholder.com/300x300?text=Camera" }
  ];

  // =============== LOAD PRODUCTS ===============
  async function loadProducts() {
    const loader = document.getElementById('loader');
    loader.classList.remove('hidden');
    
    try {
      if (!supabase) throw new Error("Supabase not initialized");
      
      const { data, error } = await supabase
        .from('products')
        .select('*')
        .eq('active', true)
        .order('id', { ascending: false });
      
      if (error) throw error;
      
      if (data && data.length > 0) {
        allProducts = data;
        console.log("✅ Loaded " + data.length + " products from Supabase");
      } else {
        allProducts = demoProducts;
        console.log("ℹ️ Using demo products");
      }
    } catch(e) {
      console.warn("⚠️ Supabase error, using demo products:", e);
      allProducts = demoProducts;
    }
    
    loader.classList.add('hidden');
    renderProducts(allProducts);
  }

  // =============== RENDER PRODUCTS ===============
  function renderProducts(products) {
    const grid = document.getElementById('productsGrid');
    const noProd = document.getElementById('noProducts');
    
    if (!products || products.length === 0) {
      grid.innerHTML = '';
      noProd.classList.remove('hidden');
      return;
    }
    
    noProd.classList.add('hidden');
    grid.innerHTML = products.map(p => `
      <div class="bg-white rounded-lg overflow-hidden hover:shadow-xl transition-shadow cursor-pointer border border-gray-200">
        <img src="${p.image_url || 'https://via.placeholder.com/300'}" alt="${p.name}" class="w-full h-48 object-cover bg-gray-200">
        <div class="p-4">
          <h3 class="font-bold text-lg line-clamp-2">${p.name}</h3>
          <p class="text-gray-600 text-sm mt-1 line-clamp-1">${p.description || ''}</p>
          <div class="flex justify-between items-center mt-4">
            <span class="text-2xl font-bold text-pink-500">${p.price} ৳</span>
            <button onclick='addToCart(${JSON.stringify(p)})' class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-lg font-bold transition">
              <i class="fas fa-cart-plus"></i>
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // =============== CART FUNCTIONS ===============
  function updateCart() {
    document.getElementById('cartCount').innerText = cart.length;
    localStorage.setItem('zynxCart', JSON.stringify(cart));
  }

  function addToCart(product) {
    const existing = cart.find(p => p.id === product.id);
    if (existing) {
      existing.qty = (existing.qty || 1) + 1;
    } else {
      cart.push({...product, qty: 1});
    }
    updateCart();
    showToast('✅ ' + product.name + ' কার্টে যোগ হয়েছে');
  }

  function removeFromCart(id) {
    cart = cart.filter(p => p.id !== id);
    updateCart();
    document.getElementById('cartBtn').click();
  }

  function renderCart() {
    const items = document.getElementById('cartItems');
    const total = document.getElementById('cartTotal');
    
    if (cart.length === 0) {
      items.innerHTML = '<p class="text-center text-gray-500 py-4">কার্ট খালি</p>';
      total.innerText = '০ ৳';
      return;
    }
    
    items.innerHTML = cart.map((p, i) => `
      <div class="flex justify-between items-center border-b pb-3">
        <div>
          <p class="font-bold">${p.name}</p>
          <p class="text-sm text-gray-600">${p.price} ৳ × ${p.qty} = ${p.price * p.qty} ৳</p>
        </div>
        <button onclick='removeFromCart(${p.id})' class="text-red-500 hover:text-red-700 font-bold">✕</button>
      </div>
    `).join('');
    
    const cartTotal = cart.reduce((sum, p) => sum + p.price * p.qty, 0);
    total.innerText = cartTotal + ' ৳';
  }

  // =============== SEARCH ===============
  function searchProducts() {
    currentSearch = document.getElementById('searchInput').value.toLowerCase();
    if (!currentSearch) {
      renderProducts(allProducts);
      return;
    }
    
    const filtered = allProducts.filter(p => 
      p.name.toLowerCase().includes(currentSearch) || 
      (p.description && p.description.toLowerCase().includes(currentSearch))
    );
    renderProducts(filtered);
  }

  // =============== CHECKOUT ===============
  async function submitOrder(data) {
    const totalPrice = cart.reduce((sum, p) => sum + p.price * p.qty, 0);
    const productName = cart.map(p => `${p.name} (${p.qty})`).join(', ');
    
    try {
      const { error } = await supabase.from('orders').insert({
        customer_name: data.name,
        phone: data.phone,
        email: data.email,
        address: data.address,
        product_name: productName,
        quantity: cart.reduce((sum, p) => sum + p.qty, 0),
        total_price: totalPrice,
        payment_method: data.payment,
        trx_id: data.trx_id,
        status: 'Pending',
        created_at: new Date().toISOString()
      });
      
      if (error) throw error;
      console.log("✅ Order saved to Supabase");
      return true;
    } catch(e) {
      console.warn("⚠️ Supabase order error:", e);
      return true; // Continue anyway
    }
  }

  // =============== EVENT LISTENERS ===============
  document.getElementById('cartBtn').addEventListener('click', () => {
    renderCart();
    document.getElementById('cartModal').classList.remove('hidden');
  });

  document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if (cart.length === 0) {
      showToast('❌ কার্ট খালি');
      return;
    }
    
    const form = new FormData(e.target);
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerText = 'প্রক্রিয়া চলছে...';
    
    try {
      await submitOrder({
        name: form.get('name'),
        phone: form.get('phone'),
        email: form.get('email'),
        address: form.get('address'),
        payment: form.get('payment'),
        trx_id: form.get('trx_id')
      });
      
      showToast('✅ অর্ডার সফল! আমরা শীঘ্রই যোগাযোগ করব');
      cart = [];
      updateCart();
      closeCheckout();
      closeCart();
      e.target.reset();
    } catch(e) {
      showToast('❌ Error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerText = 'অর্ডার নিশ্চিত করুন';
    }
  });

  function proceedCheckout() {
    if (cart.length === 0) {
      showToast('❌ কার্ট খালি');
      return;
    }
    document.getElementById('cartModal').classList.add('hidden');
    document.getElementById('checkoutModal').classList.remove('hidden');
  }

  function closeCart() {
    document.getElementById('cartModal').classList.add('hidden');
  }

  function closeCheckout() {
    document.getElementById('checkoutModal').classList.add('hidden');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // =============== INITIALIZE ===============
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchProducts();
  });

  loadProducts();
  updateCart();
</script>

</body>
</html>
