<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zynxbd - অনলাইন শপ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 9999; opacity: 0; transition: 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50">

<!-- Header -->
<header class="sticky top-0 z-40 bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Zynx<span class="text-pink-500">bd</span></h1>
    <div class="flex gap-4">
      <a href="admin.html" class="text-pink-500 hover:underline font-medium">🔐 Admin</a>
      <button id="cartBtn" class="relative text-xl">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </button>
    </div>
  </div>
</header>

<!-- Hero -->
<section class="bg-gradient-to-r from-pink-500 to-purple-600 text-white py-20 text-center">
  <h2 class="text-4xl font-bold mb-4">সেরা পণ্য, সেরা দাম</h2>
  <p class="text-lg mb-6">আপনার পছন্দের সব কিছু এক জায়গায়</p>
  <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" class="bg-white text-pink-500 px-8 py-3 rounded-full font-bold hover:bg-gray-100">শপিং শুরু করুন</button>
</section>

<!-- Products -->
<section id="products" class="max-w-6xl mx-auto px-4 py-12">
  <h2 class="text-3xl font-bold mb-8">আমাদের প্রোডাক্ট</h2>
  <div class="mb-6 flex gap-2">
    <input type="text" id="search" placeholder="খুঁজুন..." class="flex-1 border rounded-lg p-2">
    <button onclick="searchProducts()" class="bg-pink-500 text-white px-6 rounded-lg">🔍</button>
  </div>
  <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
</section>

<!-- Cart Modal -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg max-w-md w-full p-6">
    <h3 class="text-2xl font-bold mb-4">কার্ট</h3>
    <div id="cartItems" class="space-y-3 mb-4 max-h-64 overflow-y-auto"></div>
    <div class="flex justify-between font-bold mb-4">
      <span>মোট:</span>
      <span id="cartTotal">০ ৳</span>
    </div>
    <button onclick="checkout()" class="w-full bg-pink-500 text-white py-2 rounded-lg font-bold mb-2">অর্ডার করুন</button>
    <button onclick="document.getElementById('cartModal').classList.add('hidden')" class="w-full border py-2 rounded-lg">বন্ধ করুন</button>
  </div>
</div>

<!-- Checkout Modal -->
<div id="checkoutModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
    <h3 class="text-2xl font-bold mb-4">অর্ডার তথ্য</h3>
    <form id="checkoutForm" class="space-y-3">
      <input type="text" name="name" placeholder="নাম" required class="w-full border rounded-lg p-2">
      <input type="tel" name="phone" placeholder="ফোন" required class="w-full border rounded-lg p-2">
      <input type="email" name="email" placeholder="ইমেইল" required class="w-full border rounded-lg p-2">
      <input type="text" name="address" placeholder="ঠিকানা" required class="w-full border rounded-lg p-2">
      <select name="payment" required class="w-full border rounded-lg p-2">
        <option value="">পেমেন্ট পদ্ধতি</option>
        <option value="bKash">bKash</option>
        <option value="Nagad">Nagad</option>
      </select>
      <input type="text" name="trx_id" placeholder="Trx ID" required class="w-full border rounded-lg p-2">
      <button type="submit" class="w-full bg-pink-500 text-white py-2 rounded-lg font-bold">অর্ডার নিশ্চিত করুন</button>
    </form>
  </div>
</div>

<footer class="bg-gray-800 text-white text-center py-4 mt-12">
  © ২০২৬ Zynxbd
</footer>

<div id="toast" class="toast"></div>

<script>
  const SUPABASE_URL = "https://omotctqkemtuogpnlywo.supabase.co";
  const SUPABASE_ANON = "sb_publishable_6vLOupcl0H3fPfkOEdHYuw_mNCC_3IO";
  
  let supabase;
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  } catch(e) {
    console.error("Supabase error:", e);
  }

  let products = [];
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  const demoProducts = [
    { id: 1, name: "ইলেকট্রনিক্স ১", price: 5000, image_url: "https://via.placeholder.com/300" },
    { id: 2, name: "ইলেকট্রনিক্স ২", price: 3000, image_url: "https://via.placeholder.com/300" },
    { id: 3, name: "পোশাক ১", price: 1500, image_url: "https://via.placeholder.com/300" },
    { id: 4, name: "পোশাক ২", price: 2000, image_url: "https://via.placeholder.com/300" }
  ];

  async function loadProducts() {
    try {
      const { data, error } = await supabase.from('products').select('*').limit(12);
      if (error) throw error;
      products = data || demoProducts;
    } catch(e) {
      products = demoProducts;
    }
    renderProducts();
    updateCart();
  }

  function renderProducts() {
    document.getElementById('productsGrid').innerHTML = products.map(p => `
      <div class="border rounded-lg overflow-hidden hover:shadow-lg transition">
        <img src="${p.image_url || 'https://via.placeholder.com/300'}" class="w-full h-48 object-cover" alt="${p.name}">
        <div class="p-4">
          <h3 class="font-bold">${p.name}</h3>
          <p class="text-lg font-bold text-pink-500 mt-2">${p.price} ৳</p>
          <button onclick='addCart(${JSON.stringify(p)})' class="w-full bg-pink-500 text-white py-2 rounded mt-2">কিনুন</button>
        </div>
      </div>
    `).join('');
  }

  function addCart(product) {
    const existing = cart.find(p => p.id === product.id);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({...product, qty: 1});
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCart();
    showToast(product.name + ' কার্টে যোগ হয়েছে');
  }

  function updateCart() {
    document.getElementById('cartCount').innerText = cart.length;
  }

  document.getElementById('cartBtn').addEventListener('click', () => {
    const modal = document.getElementById('cartModal');
    modal.classList.remove('hidden');
    document.getElementById('cartItems').innerHTML = cart.map((p, i) => `
      <div class="flex justify-between border-b pb-2">
        <div>
          <p class="font-bold">${p.name}</p>
          <p class="text-sm">${p.price} ৳ x ${p.qty}</p>
        </div>
        <button onclick='removeCart(${i})' class="text-red-500">সরান</button>
      </div>
    `).join('');
    const total = cart.reduce((sum, p) => sum + p.price * p.qty, 0);
    document.getElementById('cartTotal').innerText = total + ' ৳';
  });

  function removeCart(idx) {
    cart.splice(idx, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCart();
    document.getElementById('cartBtn').click();
  }

  function checkout() {
    if (cart.length === 0) {
      showToast('কার্ট খালি');
      return;
    }
    document.getElementById('cartModal').classList.add('hidden');
    document.getElementById('checkoutModal').classList.remove('hidden');
  }

  document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const total = cart.reduce((sum, p) => sum + p.price * p.qty, 0);
    
    try {
      await supabase.from('orders').insert({
        customer_name: form.get('name'),
        phone: form.get('phone'),
        email: form.get('email'),
        address: form.get('address'),
        product_name: cart.map(p => p.name).join(', '),
        quantity: cart.length,
        total_price: total,
        payment_method: form.get('payment'),
        trx_id: form.get('trx_id'),
        status: 'Pending'
      });
      showToast('✅ অর্ডার সফল!');
      cart = [];
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCart();
      document.getElementById('checkoutModal').classList.add('hidden');
      document.getElementById('checkoutForm').reset();
    } catch(e) {
      showToast('❌ Error: ' + e.message);
    }
  });

  function searchProducts() {
    const term = document.getElementById('search').value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(term));
    document.getElementById('productsGrid').innerHTML = filtered.map(p => `
      <div class="border rounded-lg overflow-hidden hover:shadow-lg transition">
        <img src="${p.image_url || 'https://via.placeholder.com/300'}" class="w-full h-48 object-cover">
        <div class="p-4">
          <h3 class="font-bold">${p.name}</h3>
          <p class="text-lg font-bold text-pink-500 mt-2">${p.price} ৳</p>
          <button onclick='addCart(${JSON.stringify(p)})' class="w-full bg-pink-500 text-white py-2 rounded mt-2">কিনুন</button>
        </div>
      </div>
    `).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadProducts();
</script>

</body>
</html>
