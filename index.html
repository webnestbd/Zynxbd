<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynxbd - অনলাইন শপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-5">
    <h1 class="text-3xl font-bold text-center my-5">Zynxbd <span class="text-pink-500">Shop</span></h1>
    
    <!-- Products Grid -->
    <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>
    
    <!-- Admin Button -->
    <div class="text-center my-5">
        <button onclick="showLogin()" class="bg-pink-500 text-white px-6 py-2 rounded-lg">অ্যাডমিন লগইন</button>
    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white p-6 rounded-lg w-96">
        <h3 class="text-xl font-bold mb-4">অ্যাডমিন লগইন</h3>
        <input type="email" id="email" placeholder="ইমেইল" class="w-full border p-2 rounded mb-3">
        <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full border p-2 rounded mb-3">
        <button onclick="login()" class="bg-pink-500 w-full py-2 rounded text-white">লগইন</button>
        <button onclick="closeLogin()" class="bg-gray-500 w-full py-2 rounded mt-2 text-white">বন্ধ</button>
    </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="hidden fixed inset-0 bg-black/95 overflow-y-auto p-5">
    <div class="max-w-4xl mx-auto bg-white rounded-lg p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">অ্যাডমিন প্যানেল</h2>
            <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">লগআউট</button>
        </div>
        
        <div class="border p-4 rounded mb-4">
            <h3 class="font-bold mb-2">নতুন পণ্য যোগ করুন</h3>
            <input type="text" id="prodName" placeholder="পণ্যের নাম" class="border p-2 rounded w-full mb-2">
            <input type="number" id="prodPrice" placeholder="দাম" class="border p-2 rounded w-full mb-2">
            <textarea id="prodDesc" placeholder="বিবরণ" class="border p-2 rounded w-full mb-2"></textarea>
            <button onclick="addProduct()" class="bg-green-500 text-white px-4 py-2 rounded">যোগ করুন</button>
        </div>
        
        <div>
            <h3 class="font-bold mb-2">পণ্যের তালিকা</h3>
            <div id="adminProducts"></div>
        </div>
    </div>
</div>

<script>
    // ==================== আপনার সঠিক তথ্য ====================
    const SUPABASE_URL = "https://jxtxnotpaohhliziscir.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4dHhub3RwYW9oaGxpemlzY2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODc2MjYsImV4cCI6MjA5NTk2MzYyNn0.trYVnmDV7fKRgwqwz5UCC52YK2pKbVuG8T5BtbeFhFk";
    // ========================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    let currentUser = null;

    async function loadProducts() {
        const { data, error } = await supabase.from('products').select('*');
        if (error) {
            document.getElementById('products').innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
        } else if (!data || data.length === 0) {
            document.getElementById('products').innerHTML = '<p class="text-gray-500">কোন পণ্য নেই</p>';
        } else {
            document.getElementById('products').innerHTML = data.map(p => `
                <div class="bg-white rounded-lg shadow p-4">
                    <h3 class="font-bold text-lg">${p.name}</h3>
                    <p class="text-pink-500 text-xl font-bold">${p.price} ৳</p>
                    <p class="text-gray-600">${p.description || ''}</p>
                </div>
            `).join('');
        }
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            alert('লগইন ব্যর্থ: ' + error.message);
        } else {
            currentUser = data.user;
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            loadAdminProducts();
        }
    }

    async function loadAdminProducts() {
        const { data } = await supabase.from('products').select('*');
        if (data && data.length > 0) {
            document.getElementById('adminProducts').innerHTML = data.map(p => `
                <div class="flex justify-between items-center border-b p-2">
                    <span>${p.name} - ${p.price}৳</span>
                    <button onclick="deleteProduct(${p.id})" class="bg-red-500 text-white px-3 py-1 rounded">ডিলিট</button>
                </div>
            `).join('');
        } else {
            document.getElementById('adminProducts').innerHTML = '<p>কোন পণ্য নেই</p>';
        }
    }

    async function addProduct() {
        const name = document.getElementById('prodName').value;
        const price = parseInt(document.getElementById('prodPrice').value);
        const description = document.getElementById('prodDesc').value;
        if (!name || !price) { alert('নাম এবং দাম দিন'); return; }
        const { error } = await supabase.from('products').insert([{ name, price, description }]);
        if (error) { alert('Error: ' + error.message); } 
        else {
            alert('পণ্য যোগ সফল!');
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodDesc').value = '';
            loadProducts();
            loadAdminProducts();
        }
    }

    async function deleteProduct(id) {
        if (!confirm('ডিলিট করবেন?')) return;
        await supabase.from('products').delete().eq('id', id);
        loadProducts();
        loadAdminProducts();
    }

    function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
    function closeLogin() { document.getElementById('loginModal').classList.add('hidden'); }
    function logout() {
        currentUser = null;
        document.getElementById('adminPanel').classList.add('hidden');
        loadProducts();
    }

    loadProducts();
</script>

</body>
</html>
